<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#1d1d1f" class="logo-bg"/>
  <text x="16" y="13.5" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Helvetica Neue,Arial,sans-serif" font-weight="800" font-size="9" fill="#f5f5f7" class="logo-text" letter-spacing="2.5">BA</text>
  <text x="16" y="25" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Helvetica Neue,Arial,sans-serif" font-weight="800" font-size="9" fill="#f5f5f7" class="logo-text" letter-spacing="2.5">CS</text>
